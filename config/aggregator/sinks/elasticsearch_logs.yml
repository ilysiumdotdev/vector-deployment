sinks:
  elasticsearch_logs:
    type: elasticsearch
    api_version: "v8"
    inputs:
      - transform_envoy_access_logs
      # - transform_hubble_flow_logs
      - transform_kubernetes_logs
      - transform_kubernetes_audit_logs
      - transform_vault_audit_logs
      - route_logs.unifi_logs
      - route_logs._unmatched
    endpoints:
      - https://elasticsearch-es-http.elastic-stack.svc:9200
    tls:
      ca_file: /etc/ssl/elastic/ca.crt
    auth:
      strategy: basic
      user: "$${ELASTIC_USERNAME}"
      password: "$${ELASTIC_PASSWORD}"
    mode: data_stream
    data_stream:
      type: logs
      dataset: "{{ .@dataset }}"
      namespace: "{{ .@namespace }}"
    bulk:
      action: create
