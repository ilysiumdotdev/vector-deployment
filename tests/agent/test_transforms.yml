tests:
  - name: test_tag_hubble_flow_logs
    inputs:
      - insert_at: tag_hubble_flow_logs
        type: log
        log_fields:
          message: "{}"
    outputs:
      - extract_from: tag_hubble_flow_logs
        conditions:
          - type: vrl
            source: |
              # Assert that the data stream for the logs follows 'logs-{dataset}-{namespace}'
              expected_destination = "logs-hubble.flow-default"
              destination = "logs-" + string!(.@dataset) + "-" + string!(.@namespace)

              assert_eq!(.@source, "hubble_flow")
              assert_eq!(.@dataset, "hubble.flow")
              assert_eq!(.@namespace, "default")

              assert_eq!(destination, expected_destination)

  - name: test_tag_kubernetes_logs
    inputs:
      - insert_at: tag_kubernetes_logs
        type: log
        log_fields:
          kubernetes:
            container_name: postgres
            pod_namespace: payments-service
          message: "{}"
    outputs:
      - extract_from: tag_kubernetes_logs
        conditions:
          - type: vrl
            source: |
              # Assert that the data stream for the logs follows 'logs-{dataset}-{namespace}'
              expected_destination = "logs-kubernetes.payments-service-default"
              destination = "logs-" + string!(.@dataset) + "-" + string!(.@namespace)

              assert_eq!(.@source, "kubernetes")
              assert_eq!(.@dataset, "kubernetes.payments-service")
              assert_eq!(.@namespace, "default")

              assert_eq!(destination, expected_destination)

  - name: test_tag_kubernetes_audit_logs
    inputs:
      - insert_at: tag_kubernetes_audit_logs
        type: log
        log_fields:
          message: "{}"
    outputs:
      - extract_from: tag_kubernetes_audit_logs
        conditions:
          - type: vrl
            source: |
              # Assert that the data stream for the logs follows 'logs-{dataset}-{namespace}'
              expected_destination = "logs-kubernetes.audit-default"
              destination = "logs-" + string!(.@dataset) + "-" + string!(.@namespace)

              assert_eq!(.@source, "kubernetes_audit")
              assert_eq!(.@dataset, "kubernetes.audit")
              assert_eq!(.@namespace, "default")

              assert_eq!(destination, expected_destination)
