apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: vector
  namespace: vector
spec:
  interval: 5m
  url: https://helm.vector.dev
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vector-agent
  namespace: vector
spec:
  serviceAccountName: flux
  targetNamespace: vector
  interval: 30m
  chart:
    spec:
      chart: vector
      version: "0.51.x"
      sourceRef:
        kind: HelmRepository
        name: vector
      interval: 12h
  releaseName: vector-agent
  # https://github.com/vectordotdev/helm-charts/blob/develop/charts/vector/values.yaml
  values:
    role: "Agent"
    dataDir: /var/local/lib/vector
    existingConfigMaps:
      - vector-agent-config

    serviceAccount:
      create: true
      name: vector-agent

    rbac:
      create: false

    extraVolumes:
      - name: elastic-ca
        configMap:
          name: elastic-ca

    extraVolumeMounts:
      - name: elastic-ca
        mountPath: /etc/ssl/elastic
        readOnly: true

    env:
      - name: ELASTIC_USERNAME
        valueFrom:
          secretKeyRef:
            name: vector-elastic-credentials
            key: username
      - name: ELASTIC_PASSWORD
        valueFrom:
          secretKeyRef:
            name: vector-elastic-credentials
            key: password
